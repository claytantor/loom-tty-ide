theme: default
editor:
  tabSize: 2
  showLineNumbers: true
ignore:
  - node_modules
  - .git
  - dist
ai:
  provider: anthropic       # anthropic | openai | ollama
  anthropic:
    model: claude-sonnet-4-20250514
    apiKeyEnv: ANTHROPIC_API_KEY
  openai:
    model: gpt-4o-mini
    apiKeyEnv: OPENAI_API_KEY
  ollama:
    model: llama3.1
    baseUrl: http://localhost:11434
